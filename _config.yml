title: Mr Fantasy
url: "https://puriprabhat-a11y.github.io/Mr-Fantasy/"
baseurl: "/Mr-Fantasy/"

# ============================================================
# PERFORMANCE & SEO PLUGINS
# ============================================================
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-compress-html

# ============================================================
# HTML COMPRESSION (minify CSS, JS, HTML)
# ============================================================
compress_html:
  clippings: all
  comments: []
  endings: []
  startings: []
  blanklines: false
  profile: false
  ignore:
    envs: []

# ============================================================
# BUILD OUTPUT
# ============================================================
output: "site"
safe: true
encoding: utf-8

# ============================================================
# SASS OUTPUT (compressed CSS)
# ============================================================
sass:
  style: compressed
